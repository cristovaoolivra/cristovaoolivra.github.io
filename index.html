<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
    
        :root {
            --bg-color: #1B263B;
            --primary-text-color: #ffffff;
            --secondary-text-color: #d1d5db;
            --button-bg-color: #ffffff;
            --button-text-color: #1B263B;
            --button-hover-bg-color: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --font-main: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-text-color);
            font-family: var(--font-main);
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0; 
        }

        .container {
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        header {
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--primary-text-color);
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05); 
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        p {
            font-size: 1rem; 
            color: var(--secondary-text-color);
            margin-bottom: 10px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: block;
            background-color: var(--button-bg-color);
            color: var(--button-text-color);
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem; 
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        
        .link-btn:hover,
        .link-btn:focus-visible {
            background-color: var(--button-hover-bg-color);
            transform: translateY(-3px);
            box-shadow: 0 4px 10px var(--shadow-color);
            outline: none; 
        }
        
        
        .link-btn.disabled {
             opacity: 0.7;
             pointer-events: none;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://i.postimg.cc/wTqGHzYD/cristovao-tech.png" alt="Foto de Perfil" class="profile-pic">

        </header>
        <main class="links">

            <a href="https://cristovaoolivratech.pages.dev/portifolio/" class="link-btn">Trabalhos realizados | Portfólio Tech</a>
            <a href="https://mega.nz/folder/IZR1SKSC#rn4VxKYTg13LABIS0yLyHA" class="link-btn" target="_blank" rel="noopener noreferrer">🎬 Trabalhos realizados | Portfólio Videomaker Mobile</a>
            <a href="https://wa.me/5584991844875" class="link-btn disable" target="_blank" rel="noopener noreferrer">💬 WhatsApp</a>
        </main>
    </div>
</body>
