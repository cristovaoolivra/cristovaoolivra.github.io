<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristóvão Oliveira | Especialista em Presença Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1B263B;
            --primary-text-color: #ffffff;
            --secondary-text-color: #d1d5db;
            --accent-color: #0095F6;
            --button-bg-color: #ffffff;
            --button-text-color: #1B263B;
            --button-hover-bg-color: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --font-main: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-text-color);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.25rem 0;
        }

        .container {
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        header {
            margin-bottom: 1.875rem;
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 0.9375rem;
        }

        .profile-pic {
            width: 6.25rem;
            height: 6.25rem;
            border-radius: 50%;
            border: 3px solid var(--primary-text-color);
            display: block;
            transition: transform 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        .verified-badge {
            position: absolute;
            bottom: 0.125rem;
            right: 0.125rem;
            width: 1.875rem;
            height: 1.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            animation: floatBadge 3s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        @keyframes floatBadge {
            0%, 100% {
                transform: translateY(0);
                filter: drop-shadow(0 0.125rem 0.25rem rgba(0, 0, 0, 0.25));
            }
            50% {
                transform: translateY(-0.25rem);
                filter: drop-shadow(0 0.375rem 0.75rem rgba(0, 149, 246, 0.5));
            }
        }

        h1 {
            font-size: 1.5rem;            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .specialty {
            display: inline-block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-color);
            background-color: rgba(0, 149, 246, 0.1);
            padding: 0.375rem 0.875rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(0, 149, 246, 0.3);
            margin-bottom: 0.625rem;
            letter-spacing: 0.03125rem;
            text-transform: uppercase;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 0.25rem 0.75rem rgba(0, 149, 246, 0.25);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
                box-shadow: 0 0.25rem 0.75rem rgba(0, 149, 246, 0.25);
            }
            50% {
                transform: translateY(-0.375rem);
                box-shadow: 0 0.625rem 1.25rem rgba(0, 149, 246, 0.4);
            }
        }

        p {
            font-size: 1rem;
            color: var(--secondary-text-color);
            margin-bottom: 0.625rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.9375rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: var(--button-bg-color);
            color: var(--button-text-color);            text-decoration: none;
            padding: 0.9375rem;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 0.125rem 0.3125rem rgba(0, 0, 0, 0.1);
        }

        .link-btn:hover,
        .link-btn:focus-visible {
            background-color: var(--button-hover-bg-color);
            transform: translateY(-0.1875rem);
            box-shadow: 0 0.25rem 0.625rem var(--shadow-color);
            outline: none;
        }

        .whatsapp-icon {
            width: 1.1rem;
            height: 1.1rem;
            flex-shrink: 0;
            fill: currentColor;
        }

        /* Mobile pequeno (até 360px) */
        @media (max-width: 360px) {
            html {
                font-size: 14px;
            }

            .container {
                width: 95%;
            }

            .profile-pic {
                width: 5rem;
                height: 5rem;
            }

            .verified-badge {
                width: 1.5rem;
                height: 1.5rem;
            }

            h1 {
                font-size: 1.3rem;
            }

            .specialty {
                font-size: 0.75rem;                padding: 0.3rem 0.7rem;
            }

            .link-btn {
                font-size: 1rem;
                padding: 0.8rem;
            }
        }

        /* Mobile médio (361px - 480px) */
        @media (min-width: 361px) and (max-width: 480px) {
            .container {
                width: 92%;
            }
        }

        /* Tablet (768px - 1024px) */
        @media (min-width: 768px) {
            .container {
                max-width: 450px;
            }

            .profile-pic {
                width: 7.5rem;
                height: 7.5rem;
            }

            .verified-badge {
                width: 2.25rem;
                height: 2.25rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .specialty {
                font-size: 0.95rem;
            }

            p {
                font-size: 1.1rem;
            }

            .link-btn {
                font-size: 1.2rem;
                padding: 1.1rem;
            }
        }
        /* Desktop (acima de 1024px) */
        @media (min-width: 1024px) {
            .container {
                max-width: 500px;
            }

            .profile-pic {
                width: 8.5rem;
                height: 8.5rem;
            }

            .verified-badge {
                width: 2.5rem;
                height: 2.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .specialty {
                font-size: 1rem;
                padding: 0.5rem 1.2rem;
            }

            p {
                font-size: 1.2rem;
            }

            .link-btn {
                font-size: 1.3rem;
                padding: 1.25rem;
            }

            .links {
                gap: 1.1rem;
            }
        }

        /* Telas muito grandes (acima de 1440px) */
        @media (min-width: 1440px) {
            .container {
                max-width: 550px;
            }

            .profile-pic {
                width: 9.5rem;
                height: 9.5rem;
            }
            .verified-badge {
                width: 2.75rem;
                height: 2.75rem;
            }

            h1 {
                font-size: 2.25rem;
            }

            .specialty {
                font-size: 1.1rem;
            }

            p {
                font-size: 1.3rem;
            }

            .link-btn {
                font-size: 1.4rem;
                padding: 1.4rem;
            }
        }
    </style>
