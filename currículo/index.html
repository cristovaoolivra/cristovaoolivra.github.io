<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3; url=https://cristovaoolivra.pages.dev/curriculo/curriculo.pdf">
  <title>Redirecionando...</title>
  <style>
    body {
      background-color: #0d1b2a;
      color: #e0e1dd;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .loader {
      border: 4px solid #1f2a38;
      border-top: 4px solid #1F75FE;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    a {
      color: #1F75FE;
      text-decoration: none;
      font-weight: bold;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="loader"></div>
  <p>Redirecionando para o currículo...</p>
  <p style="font-size: 14px; margin-top: 10px;">
    Se não for redirecionado em instantes, <a href="https://cristovaoolivratech.pages.dev/curriculo">clique aqui</a>.
  </p>

  <script>
    setTimeout(function() {
      window.location.href = "https://cristovaoolivratech.pages.dev/curriculo";
    }, 1000);
  </script>

</body>
</html>
