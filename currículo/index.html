<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currículo | Cristóvão</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d1b2a;
      color: #e0e1dd;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
      overflow: hidden;
    }

    .botao1 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background-color: #add8e6;
      color: #0d1b2a;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: background-color 0.3s ease, transform 0.2s, box-shadow 0.2s;
      width: 100%;
      max-width: 300px;
      cursor: pointer;
    }

    .botao1:hover {
      background-color: #87ceeb;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.25);
    }

    .botao1:active {
      transform: translateY(0);
    }

    .botao1 .icon {
      font-family: 'Material Icons';
      font-size: 20px;
      display: flex;
    }

    @media (min-width: 480px) {
      .botao1 {
        font-size: 18px;
        padding: 16px 32px;
        max-width: 350px;
      }
      .botao1 .icon {
        font-size: 24px;
      }
    }

    @media (min-width: 768px) {
      body {
        padding: 40px;
      }
      .botao1 {
        font-size: 20px;
        padding: 18px 36px;
      }
      .botao1 .icon {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <a href="https://drive.google.com/file/d/1AyKxBQhdfPiEdEBUesrlciPm0hVN9_Uy/view?usp=drivesdk" class="botao1">
    <span class="icon">description</span>
    Acesse aqui o meu currículo
  </a>
</body>
</html>
