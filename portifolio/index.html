<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfólio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d1117;
      padding: 2rem;
      font-family: sans-serif;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .item {
      background-color: #161b22;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
    }

    .item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .item:hover {
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <div class="grid">
    <div class="item">
      <img src="https://files.catbox.moe/h4pubr.gif" alt="Trabalho 1">
      <a href="https://djmariosouza.com.br" target="_blank" style="color: white; margin-top: 10px; text-decoration: none; font-size: 1rem;">
      djmariosouza.com.br
    </a>
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1590272456521-1bbe160a18ce?q=80&w=927&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Trabalho 2">
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1590272456521-1bbe160a18ce?q=80&w=927&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Trabalho 3">
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1590272456521-1bbe160a18ce?q=80&w=927&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Trabalho 4">
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1590272456521-1bbe160a18ce?q=80&w=927&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Trabalho 5">
    </div>
    <div class="item">
      <img src="https://images.unsplash.com/photo-1590272456521-1bbe160a18ce?q=80&w=927&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Trabalho 6">
    </div>
  </div>

</body>
</html>
